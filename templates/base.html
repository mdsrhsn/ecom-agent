<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Ecom Agent{% endblock %}</title>
<script src="https://unpkg.com/htmx.org@2.0.3"></script>
<style>
  :root {
    --bg: #f5f5f2;
    --card: #ffffff;
    --ink: #1f1f1d;
    --muted: #6b6b65;
    --line: #e3e1d8;
    --accent: #1d9e75;
    --warn: #ba7517;
    --danger: #a32d2d;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
         background: var(--bg); color: var(--ink); }
  header { background: var(--card); border-bottom: 1px solid var(--line); padding: 12px 24px;
           display: flex; gap: 24px; align-items: center; }
  header a { color: var(--ink); text-decoration: none; padding: 6px 10px; border-radius: 6px; }
  header a:hover { background: var(--bg); }
  header .brand { font-weight: 600; margin-right: auto; }
  main { max-width: 1200px; margin: 24px auto; padding: 0 24px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px;
          padding: 20px; margin-bottom: 16px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  @media (max-width: 720px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } }
  .kpi-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .kpi-value { font-size: 32px; font-weight: 600; margin-top: 4px; }
  h1 { font-size: 22px; font-weight: 500; margin: 0 0 16px; }
  h2 { font-size: 18px; font-weight: 500; margin: 0 0 12px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line); font-size: 14px; }
  th { font-weight: 500; color: var(--muted); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
  .badge-warn { background: #FAEEDA; color: #633806; }
  .badge-danger { background: #FCEBEB; color: #791F1F; }
  .badge-ok { background: #E1F5EE; color: #085041; }
  .row-list li { margin: 4px 0; }
</style>
</head>
<body>
<header>
  <span class="brand">📦 Ecom Agent</span>
  <a href="/">Dashboard</a>
  <a href="/shipments">Shipments</a>
  <a href="/chat">Chat</a>
</header>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
